kind: Deployment
metadata:
  name: presence-service
  namespace: chat-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presence-service
  template:
    metadata:
      labels:
        app: presence-service
    spec:
      containers:
        - name: presence-service
          image: bvilela/chat-presence:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Redis
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: REDIS_CONNECTION
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: RABBITMQ_HOST
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: RABBITMQ_USERNAME
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: RABBITMQ_PASSWORD
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: JWT_AUDIENCE
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: JWT_KEY
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: chat-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: bvilela/chat-notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Redis
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: REDIS_CONNECTION
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: RABBITMQ_HOST
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: RABBITMQ_USERNAME
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: RABBITMQ_PASSWORD
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: chat-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: bvilela/chat-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: JWT_AUDIENCE
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: JWT_KEY
            - name: ReverseProxy__Clusters__identity-cluster__Destinations__identity__Address
              value: http://identity-service:8080/
            - name: ReverseProxy__Clusters__message-cluster__Destinations__message__Address
              value: http://message-service:8080/
            - name: ReverseProxy__Clusters__presence-cluster__Destinations__presence__Address
              value: http://presence-service:8080/
            - name: ReverseProxy__Clusters__notification-cluster__Destinations__notification__Address
              value: http://notification-service:8080/
            - name: ReverseProxy__Clusters__chat-cluster__Destinations__chat__Address
              value: http://chat-service:8080/
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: chat-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chat-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: bvilela/chat-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
