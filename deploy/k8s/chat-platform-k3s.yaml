apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: chat-platform
spec:
  selector:
    app: chat-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: chat-platform
spec:
  selector:
    app: message-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: chat-platform
spec:
  selector:
    app: presence-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: chat-platform
spec:
  selector:
    app: notification-service
  ports:
    - port: 8080
